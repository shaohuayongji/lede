name: Build LEDE J4125

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 5"

jobs:
  build:
    name: Build x86_64 firmware
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
            gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libncurses-dev \
            libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Update and install feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply J4125 config
        run: |
          cp configs/j4125.config .config
          make defconfig

      - name: Patch Transmission miniupnpc compatibility
        run: |
          mkdir -p package/feeds/packages/transmission/patches
          cat > package/feeds/packages/transmission/patches/910-fix-miniupnpc-compat.patch <<'PATCH'
          --- a/libtransmission/upnp.c
          +++ b/libtransmission/upnp.c
          @@ -11,6 +11,7 @@
            * $Id$
            */
           
          +#include <stddef.h>
           #include <assert.h>
           #include <errno.h>
           #include <string.h>
          @@ -220,8 +221,8 @@ tr_upnpPulse( tr_upnp * handle,
               errno = 0;
               devlist = upnpDiscover (2000, NULL, NULL, 0, 0, 2, &errno);
               if (devlist != NULL)
          -        if (UPNP_GetValidIGD (devlist, &handle->urls, &handle->data,
          -                              handle->lanaddr, sizeof (handle->lanaddr)) == UPNP_IGD_VALID_CONNECTED)
          +        if (UPNP_GetValidIGD (devlist, &handle->urls, &handle->data, NULL, 0,
          +                              handle->lanaddr, sizeof (handle->lanaddr)) == UPNP_IGD_VALID_CONNECTED)
                   {
                       tr_ninf (getKey (), _("Found Internet Gateway Device \"%s\""), handle->urls.controlURL);
          PATCH

      - name: Cache package downloads
        uses: actions/cache@v4
        with:
          path: dl
          key: lede-dl-${{ hashFiles('feeds.conf.default', 'configs/j4125.config') }}
          restore-keys: |
            lede-dl-

      - name: Download package sources
        run: |
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Build tools and toolchain
        run: |
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      - name: Preflight compile Transmission
        run: |
          make package/feeds/packages/transmission/clean
          make package/feeds/packages/transmission/compile V=s

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if compgen -G "bin/targets/x86/64/*" > /dev/null; then
            cp -a bin/targets/x86/64/* artifact/
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: lede-j4125-x86-64
          path: artifact/
          if-no-files-found: warn
          retention-days: 7
